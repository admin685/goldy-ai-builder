<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Editor — Goldy Builds</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --gold: #c9a84c;
    --gold-light: #e2c97e;
    --bg: #0a0a0f;
    --panel: #0e0e16;
    --card: #111118;
    --border: rgba(201,168,76,0.18);
    --border-strong: rgba(201,168,76,0.4);
    --text: #e8e0d0;
    --muted: #7a7060;
    --user-bubble: rgba(201,168,76,0.13);
    --goldy-bubble: rgba(255,255,255,0.04);
  }
  html, body { height: 100%; overflow: hidden; }
  body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); display: flex; flex-direction: column; }

  /* ── Top nav ── */
  nav {
    display: flex; align-items: center; justify-content: space-between;
    padding: 10px 20px; border-bottom: 1px solid var(--border);
    background: var(--panel); flex-shrink: 0; height: 48px; z-index: 50;
  }
  .nav-left { display: flex; align-items: center; gap: 16px; }
  .nav-back { color: var(--muted); text-decoration: none; font-size: 0.85rem; display: flex; align-items: center; gap: 4px; transition: color 0.15s; }
  .nav-back:hover { color: var(--gold); }
  .nav-project { font-family: 'Playfair Display', serif; font-size: 1.05rem; color: var(--gold-light); }
  .nav-right { display: flex; align-items: center; gap: 12px; }
  .nav-status { font-size: 0.75rem; padding: 3px 10px; border-radius: 20px; border: 1px solid var(--border); color: var(--muted); background: transparent; transition: all 0.3s; }
  .nav-status.editing { border-color: var(--gold); color: var(--gold); background: rgba(201,168,76,0.06); }
  .nav-status.done { border-color: #5cba7e; color: #5cba7e; background: rgba(92,186,126,0.06); }
  .nav-status.error { border-color: #e05555; color: #e05555; }
  .open-btn { font-size: 0.8rem; color: var(--muted); text-decoration: none; border: 1px solid var(--border); border-radius: 5px; padding: 4px 10px; transition: all 0.15s; }
  .open-btn:hover { border-color: var(--gold); color: var(--gold); }

  /* ── Split panels ── */
  .panels { display: flex; flex: 1; overflow: hidden; position: relative; }

  /* ── Left: preview (now on right) ── */
  .left-panel { display: flex; flex-direction: column; flex: 1; min-width: 280px; position: relative; }
  .panel-bar { display: flex; align-items: center; justify-content: space-between; padding: 7px 14px; background: var(--card); border-bottom: 1px solid var(--border); flex-shrink: 0; }
  .panel-bar-label { font-size: 0.75rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.07em; font-weight: 600; }
  .url-pill { font-size: 0.72rem; color: var(--muted); background: rgba(255,255,255,0.04); border: 1px solid var(--border); border-radius: 4px; padding: 2px 8px; max-width: 280px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .iframe-wrap { flex: 1; position: relative; overflow: hidden; background: #fff; }
  #preview-frame { width: 100%; height: 100%; border: none; display: block; }

  /* ── Log overlay (appears during edit) ── */
  .log-overlay {
    position: absolute; inset: 0;
    background: rgba(10,10,15,0.92);
    backdrop-filter: blur(4px);
    display: none; flex-direction: column;
    align-items: center; justify-content: flex-start;
    padding: 32px 24px 24px;
    z-index: 20;
  }
  .log-overlay.active { display: flex; }
  .overlay-spinner {
    width: 36px; height: 36px; border: 2px solid var(--border);
    border-top-color: var(--gold); border-radius: 50%;
    animation: spin 0.8s linear infinite; margin-bottom: 16px; flex-shrink: 0;
  }
  .overlay-title { font-size: 0.9rem; color: var(--gold-light); font-weight: 600; margin-bottom: 20px; }
  .log-feed {
    width: 100%; max-width: 560px; flex: 1; overflow-y: auto;
    font-size: 0.78rem; font-family: 'Menlo', 'Consolas', monospace;
    display: flex; flex-direction: column; gap: 4px;
  }
  .log-line { display: flex; gap: 8px; line-height: 1.4; }
  .log-line .log-time { color: var(--muted); flex-shrink: 0; }
  .log-line .log-msg { color: var(--text); }
  .log-line.success .log-msg { color: #5cba7e; }
  .log-line.error   .log-msg { color: #e05555; }
  .log-line.warn    .log-msg { color: var(--gold); }

  /* ── Preview decision card ── */
  .preview-card {
    align-self: flex-start; max-width: 94%;
    background: rgba(201,168,76,0.07);
    border: 1px solid var(--border-strong);
    border-radius: 10px; border-bottom-left-radius: 3px;
    padding: 12px 14px; display: flex; flex-direction: column; gap: 10px;
  }
  .preview-card .bubble-role { font-size: 0.7rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em; color: var(--gold); margin-bottom: 2px; }
  .preview-card p { font-size: 0.88rem; line-height: 1.5; color: var(--text); }
  .preview-card a { color: var(--gold); font-size: 0.82rem; }
  .preview-actions { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 2px; }
  .action-btn {
    border: none; border-radius: 7px; padding: 8px 14px;
    font-size: 0.83rem; font-weight: 700; font-family: inherit; cursor: pointer; transition: opacity 0.15s;
  }
  .action-btn:hover { opacity: 0.82; }
  .action-btn.deploy { background: linear-gradient(135deg, #b8902a, #e2c97e); color: #0a0a0f; }
  .action-btn.discard { background: rgba(255,255,255,0.07); color: var(--muted); border: 1px solid var(--border); }
  .action-btn:disabled { opacity: 0.4; cursor: not-allowed; }

  /* ── Divider ── */
  .divider {
    width: 4px; background: var(--border); cursor: col-resize;
    flex-shrink: 0; transition: background 0.15s; position: relative; z-index: 10;
  }
  .divider:hover, .divider.dragging { background: var(--gold); }

  /* ── Right: chat (now on left) ── */
  .right-panel { display: flex; flex-direction: column; width: 40%; flex: none; min-width: 260px; border-right: 1px solid var(--border); }
  .chat-header { padding: 7px 14px; background: var(--card); border-bottom: 1px solid var(--border); flex-shrink: 0; }
  .chat-header-label { font-size: 0.75rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.07em; font-weight: 600; }

  .chat-history {
    flex: 1; overflow-y: auto; padding: 16px 14px;
    display: flex; flex-direction: column; gap: 12px;
  }
  .chat-history::-webkit-scrollbar { width: 4px; }
  .chat-history::-webkit-scrollbar-track { background: transparent; }
  .chat-history::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .bubble { max-width: 88%; padding: 10px 13px; border-radius: 10px; font-size: 0.88rem; line-height: 1.5; }
  .bubble.user {
    align-self: flex-end; background: var(--user-bubble);
    border: 1px solid var(--border-strong); color: var(--text);
    border-bottom-right-radius: 3px;
  }
  .bubble.goldy {
    align-self: flex-start; background: var(--goldy-bubble);
    border: 1px solid var(--border); color: var(--text);
    border-bottom-left-radius: 3px;
  }
  .bubble .bubble-role { font-size: 0.7rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 4px; }
  .bubble.user .bubble-role { color: var(--gold); }
  .bubble.goldy .bubble-role { color: var(--muted); }
  .bubble a { color: var(--gold); }

  .empty-chat { text-align: center; color: var(--muted); font-size: 0.85rem; margin: auto; padding: 24px; }
  .empty-chat strong { display: block; color: var(--text); font-size: 0.95rem; margin-bottom: 6px; }

  /* ── Chat input ── */
  .chat-input-wrap {
    border-top: 1px solid var(--border); padding: 12px 14px;
    display: flex; flex-direction: column; gap: 8px; background: var(--panel); flex-shrink: 0;
  }
  textarea#instruction {
    width: 100%; background: rgba(255,255,255,0.04);
    border: 1px solid var(--border); border-radius: 8px;
    padding: 10px 12px; color: var(--text); font-size: 0.88rem;
    font-family: inherit; outline: none; resize: none; height: 72px;
    transition: border 0.2s; line-height: 1.5;
  }
  textarea#instruction:focus { border-color: var(--gold); }
  textarea#instruction::placeholder { color: var(--muted); }
  .send-row { display: flex; align-items: center; justify-content: space-between; }
  .send-hint { font-size: 0.72rem; color: var(--muted); }
  #send-btn {
    background: linear-gradient(135deg, #b8902a, #e2c97e);
    color: #0a0a0f; border: none; border-radius: 7px;
    padding: 8px 20px; font-size: 0.88rem; font-weight: 700;
    cursor: pointer; font-family: inherit; transition: opacity 0.2s;
  }
  #send-btn:hover { opacity: 0.88; }
  #send-btn:disabled { opacity: 0.45; cursor: not-allowed; }

  /* ── Loading skeleton ── */
  .page-loading { display: flex; align-items: center; justify-content: center; height: 100%; color: var(--muted); flex-direction: column; gap: 14px; }
  .page-spinner { width: 32px; height: 32px; border: 2px solid var(--border); border-top-color: var(--gold); border-radius: 50%; animation: spin 0.8s linear infinite; }

  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── Scrollbar for log feed ── */
  .log-feed::-webkit-scrollbar { width: 3px; }
  .log-feed::-webkit-scrollbar-thumb { background: var(--border); }

  .deploy-btn {
    font-size: 0.8rem; font-weight: 700; font-family: inherit;
    background: #34D399; color: #111C1A; border: none; border-radius: 5px;
    padding: 5px 12px; cursor: pointer; transition: opacity 0.15s;
  }
  .deploy-btn:hover { opacity: 0.85; }
  .deploy-btn:disabled { opacity: 0.4; cursor: not-allowed; }
</style>
</head>
<body>

<nav>
  <div class="nav-left">
    <a class="nav-back" href="/dashboard">← Dashboard</a>
    <span class="nav-project" id="nav-project">Loading…</span>
  </div>
  <div class="nav-right">
    <span class="nav-status" id="nav-status">Ready</span>
    <a class="open-btn" id="open-btn" href="#" target="_blank" rel="noopener">Open site ↗</a>
    <button class="deploy-btn" id="deploy-btn" onclick="manualDeploy()">🚀 Deploy to goldy.team</button>
  </div>
</nav>

<div class="panels" id="panels">

  <!-- Left: chat (was right) -->
  <div class="right-panel" id="right-panel">
    <div class="chat-header">
      <span class="chat-header-label">Chat with Goldy</span>
    </div>
    <div class="chat-history" id="chat-history">
      <div class="page-loading" id="chat-loading">
        <div class="page-spinner"></div>
        <span>Loading history…</span>
      </div>
    </div>
    <div class="chat-input-wrap">
      <textarea id="instruction" placeholder="Tell Goldy what to change… e.g. "Make the hero background dark blue and increase the font size""></textarea>
      <div class="send-row">
        <span class="send-hint">Shift+Enter for new line</span>
        <button id="send-btn" onclick="sendEdit()">Send →</button>
      </div>
    </div>
  </div>

  <!-- Divider -->
  <div class="divider" id="divider"></div>

  <!-- Right: live preview (was left) -->
  <div class="left-panel" id="left-panel">
    <div class="panel-bar">
      <span class="panel-bar-label">Live Preview</span>
      <span class="url-pill" id="url-pill">—</span>
    </div>
    <div class="iframe-wrap">
      <iframe id="preview-frame" title="Live preview" allowfullscreen></iframe>
      <!-- Log overlay during edits -->
      <div class="log-overlay" id="log-overlay">
        <div class="overlay-spinner"></div>
        <div class="overlay-title" id="overlay-title">Goldy is working on it…</div>
        <div class="log-feed" id="log-feed"></div>
      </div>
    </div>
  </div>

</div>

<script>
  const API = '/api';
  const token = localStorage.getItem('gb_token');
  if (!token) { window.location.href = '/login'; }

  const params = new URLSearchParams(location.search);
  const projectId = Number(params.get('id'));
  if (!projectId) { alert('No project ID specified'); window.location.href = '/dashboard'; }

  let projectData = null;
  let pollTimer = null;
  let lastLogCount = 0;
  let originalIframeUrl = '';   // restored on discard

  // ── Bootstrap ────────────────────────────────────────────────────────────
  async function init() {
    try {
      // Load project list to find this project
      const res = await fetch(`${API}/auth/projects`, {
        headers: { Authorization: `Bearer ${token}` }
      });
      if (res.status === 401) { window.location.href = '/login'; return; }
      const projects = await res.json();
      projectData = projects.find(p => p.id === projectId);

      if (!projectData) {
        // Try admin endpoint
        const adminRes = await fetch(`${API}/auth/admin/projects`, {
          headers: { Authorization: `Bearer ${token}` }
        });
        if (adminRes.ok) {
          const adminProjects = await adminRes.json();
          projectData = adminProjects.find(p => p.id === projectId);
        }
      }

      if (!projectData) {
        alert('Project not found or you do not have access.');
        window.location.href = '/dashboard';
        return;
      }

      // Set up header
      document.title = `${projectData.name} — Editor`;
      document.getElementById('nav-project').textContent = projectData.name;

      // Set up iframe — always use DB preview route
      const previewSrc = `${API}/preview/${projectId}`;
      originalIframeUrl = previewSrc;
      document.getElementById('preview-frame').src = previewSrc;
      document.getElementById('url-pill').textContent = 'DB Preview';

      if (projectData.vercel_url) {
        document.getElementById('open-btn').href = projectData.vercel_url;
      } else {
        document.getElementById('open-btn').style.display = 'none';
      }

      // Load history
      await loadHistory();

      const prefill = params.get('instruction');
      if (prefill) {
        document.getElementById('instruction').value = prefill;
      }
    } catch (e) {
      console.error('Init error:', e);
    }
  }

  // ── Edit history ─────────────────────────────────────────────────────────
  async function loadHistory() {
    const histEl = document.getElementById('chat-history');
    try {
      const res = await fetch(`${API}/edit/history?projectId=${projectId}`, {
        headers: { Authorization: `Bearer ${token}` }
      });
      const history = res.ok ? await res.json() : [];
      renderHistory(history);
    } catch (e) {
      histEl.innerHTML = '<div class="empty-chat"><strong>Chat with Goldy</strong>Tell Goldy what to change and it will edit and redeploy your site.</div>';
    }
  }

  function renderHistory(history) {
    const histEl = document.getElementById('chat-history');
    if (!history.length) {
      histEl.innerHTML = '<div class="empty-chat"><strong>Chat with Goldy</strong>Tell Goldy what to change and it will edit and redeploy your site instantly.</div>';
      return;
    }
    histEl.innerHTML = history.map(h => bubbleHTML(h.role, h.message)).join('');
    histEl.scrollTop = histEl.scrollHeight;
  }

  function bubbleHTML(role, message) {
    const isUser = role === 'user';
    const label = isUser ? 'You' : '⚒️ Goldy';
    const safe = escHtml(message).replace(/(https?:\/\/[^\s]+)/g, '<a href="$1" target="_blank" rel="noopener">$1</a>');
    return `<div class="bubble ${isUser ? 'user' : 'goldy'}">
      <div class="bubble-role">${label}</div>
      <div>${safe}</div>
    </div>`;
  }

  function appendBubble(role, message) {
    const histEl = document.getElementById('chat-history');
    const emptyEl = histEl.querySelector('.empty-chat');
    if (emptyEl) emptyEl.remove();
    histEl.insertAdjacentHTML('beforeend', bubbleHTML(role, message));
    histEl.scrollTop = histEl.scrollHeight;
  }

  function escHtml(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  // ── Send edit ─────────────────────────────────────────────────────────────
  async function sendEdit() {
    const instrEl = document.getElementById('instruction');
    const instruction = instrEl.value.trim();
    if (!instruction) { instrEl.focus(); return; }

    const btn = document.getElementById('send-btn');
    btn.disabled = true;
    btn.textContent = 'Sending…';

    setStatus('editing');

    try {
      const res = await fetch(`${API}/edit`, {
        method: 'POST',
        headers: { Authorization: `Bearer ${token}`, 'Content-Type': 'application/json' },
        body: JSON.stringify({ projectId, instruction }),
      });

      const data = await res.json();
      if (!res.ok) {
        setStatus('ready');
        appendBubble('goldy', '⚠️ ' + (data.error || 'Something went wrong'));
        btn.disabled = false;
        btn.textContent = 'Send →';
        return;
      }

      // Append user bubble immediately
      appendBubble('user', instruction);
      instrEl.value = '';

      // Show log overlay
      showOverlay();
      lastLogCount = 0;

      // Start polling
      pollTimer = setInterval(pollEditStatus, 1500);
    } catch (e) {
      setStatus('ready');
      appendBubble('goldy', '⚠️ Network error — please try again');
      btn.disabled = false;
      btn.textContent = 'Send →';
    }
  }

  async function pollEditStatus() {
    try {
      const res = await fetch(`${API}/edit/status?projectId=${projectId}`, {
        headers: { Authorization: `Bearer ${token}` }
      });
      const data = await res.json();

      appendOverlayLogs(data.logs || []);

      if (data.status === 'preview') {
        clearInterval(pollTimer); pollTimer = null;
        onPreviewReady(data.result || {});
      } else if (data.status === 'done') {
        clearInterval(pollTimer); pollTimer = null;
        onConfirmDone(data.result || {});
      } else if (data.status === 'error') {
        clearInterval(pollTimer); pollTimer = null;
        onEditError(data.error || 'Unknown error');
      }
    } catch (e) {
      console.warn('Poll error:', e);
    }
  }

  // ── Overlay log ───────────────────────────────────────────────────────────
  function showOverlay() {
    document.getElementById('log-overlay').classList.add('active');
    document.getElementById('log-feed').innerHTML = '';
  }

  function hideOverlay() {
    document.getElementById('log-overlay').classList.remove('active');
  }

  function appendOverlayLogs(logs) {
    const feed = document.getElementById('log-feed');
    for (let i = lastLogCount; i < logs.length; i++) {
      const l = logs[i];
      const t = new Date(l.ts).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit' });
      const div = document.createElement('div');
      div.className = `log-line ${l.type}`;
      div.innerHTML = `<span class="log-time">${t}</span><span class="log-msg">${escHtml(l.msg)}</span>`;
      feed.appendChild(div);
      feed.scrollTop = feed.scrollHeight;
    }
    lastLogCount = logs.length;
  }

  // ── Preview ready — show decision bubble, load preview iframe ────────────
  function onPreviewReady(result) {
    hideOverlay();
    setStatus('previewing');

    // Load the pending preview from DB (shows unsaved edited files)
    const pendingPreviewUrl = `${API}/preview/${projectId}?pending=1`;
    document.getElementById('preview-frame').src = pendingPreviewUrl;
    document.getElementById('url-pill').textContent = '👁 Preview (pending)';

    // Inject the decision card into the chat
    const histEl = document.getElementById('chat-history');
    const emptyEl = histEl.querySelector('.empty-chat');
    if (emptyEl) emptyEl.remove();

    const card = document.createElement('div');
    card.className = 'preview-card';
    card.id = 'preview-decision-card';
    card.innerHTML = `
      <div class="bubble-role">⚒️ Goldy</div>
      <p>Here's your preview — take a look at the site on the right.</p>
      <div class="preview-actions">
        <button class="action-btn deploy" id="btn-deploy" onclick="onDeploy()">✅ Looks good — Deploy to goldy.team</button>
        <button class="action-btn discard" id="btn-discard" onclick="onDiscard()">❌ Try again</button>
      </div>`;
    histEl.appendChild(card);
    histEl.scrollTop = histEl.scrollHeight;
  }

  // ── Deploy: confirm → push to GitHub + production + DB ───────────────────
  async function onDeploy() {
    document.getElementById('btn-deploy').disabled = true;
    document.getElementById('btn-discard').disabled = true;

    setStatus('confirming');
    document.getElementById('overlay-title').textContent = 'Deploying to goldy.team…';
    showOverlay();
    lastLogCount = 0;

    try {
      const res = await fetch(`${API}/edit/confirm`, {
        method: 'POST',
        headers: { Authorization: `Bearer ${token}`, 'Content-Type': 'application/json' },
        body: JSON.stringify({ projectId }),
      });
      if (!res.ok) {
        const data = await res.json();
        hideOverlay();
        setStatus('error');
        appendBubble('goldy', '⚠️ ' + (data.error || 'Deploy failed'));
        setTimeout(() => setStatus('ready'), 3000);
        enableInput();
        return;
      }
      // Start polling for confirming → done
      pollTimer = setInterval(pollEditStatus, 1500);
    } catch (e) {
      hideOverlay();
      onEditError('Network error during deploy');
    }
  }

  // ── Discard: wipe pending changes, restore original iframe ───────────────
  async function onDiscard() {
    document.getElementById('btn-deploy').disabled = true;
    document.getElementById('btn-discard').disabled = true;

    try {
      await fetch(`${API}/edit/discard`, {
        method: 'POST',
        headers: { Authorization: `Bearer ${token}`, 'Content-Type': 'application/json' },
        body: JSON.stringify({ projectId }),
      });
    } catch { /* non-fatal */ }

    // Remove decision card
    document.getElementById('preview-decision-card')?.remove();

    // Restore DB preview iframe
    const frame = document.getElementById('preview-frame');
    frame.src = originalIframeUrl;
    document.getElementById('url-pill').textContent = 'DB Preview';

    appendBubble('goldy', "No problem — let's try something different. What would you like to change?");
    setStatus('ready');
    enableInput();
  }

  // ── Confirm done — changes are live in production ─────────────────────────
  function onConfirmDone(result) {
    hideOverlay();
    document.getElementById('overlay-title').textContent = 'Goldy is working on it…';

    // Remove decision card (if still visible)
    document.getElementById('preview-decision-card')?.remove();

    const productionUrl = result.productionUrl;

    // Refresh the DB preview iframe to show latest files
    refreshIframe();

    // Update open-btn to point to production URL if available
    if (productionUrl) {
      projectData.vercel_url = productionUrl;
      document.getElementById('open-btn').href = productionUrl;
      document.getElementById('open-btn').style.display = '';
    }

    const msg = productionUrl
      ? `Your changes are live at ${productionUrl}`
      : 'Your changes have been saved.';
    appendBubble('goldy', msg);

    setStatus('done');
    setTimeout(() => setStatus('ready'), 3000);
    enableInput();
  }

  function onEditError(error) {
    hideOverlay();
    setStatus('error');
    appendBubble('goldy', `⚠️ ${error}`);
    // Reset overlay title for next time
    document.getElementById('overlay-title').textContent = 'Goldy is working on it…';
    enableInput();
    setTimeout(() => setStatus('ready'), 4000);
  }

  function enableInput() {
    const btn = document.getElementById('send-btn');
    btn.disabled = false;
    btn.textContent = 'Send →';
  }

  function refreshIframe() {
    const frame = document.getElementById('preview-frame');
    frame.src = '';
    setTimeout(() => { frame.src = `${API}/preview/${projectId}`; }, 200);
  }

  async function manualDeploy() {
    const btn = document.getElementById('deploy-btn');
    const origText = btn.textContent;
    btn.disabled = true;
    btn.textContent = '🚀 Deploying…';

    try {
      const res = await fetch(`${API}/deploy/${projectId}`, {
        method: 'POST',
        headers: { Authorization: `Bearer ${token}`, 'Content-Type': 'application/json' },
      });
      const data = await res.json();
      if (!res.ok) {
        appendBubble('goldy', '⚠️ Deploy failed: ' + (data.error || 'Unknown error'));
        btn.disabled = false;
        btn.textContent = origText;
        return;
      }

      if (data.vercelUrl) {
        projectData.vercel_url = data.vercelUrl;
        document.getElementById('open-btn').href = data.vercelUrl;
        document.getElementById('open-btn').style.display = '';
        appendBubble('goldy', `🚀 Deployed! Live at ${data.vercelUrl}`);
      } else {
        appendBubble('goldy', '✓ Deploy completed (no Vercel URL returned).');
      }
    } catch (e) {
      appendBubble('goldy', '⚠️ Network error during deploy');
    }

    btn.disabled = false;
    btn.textContent = origText;
  }

  // ── Status badge ──────────────────────────────────────────────────────────
  function setStatus(s) {
    const el = document.getElementById('nav-status');
    el.className = 'nav-status';
    if (s === 'editing')    { el.classList.add('editing'); el.textContent = '⚡ Editing…'; }
    else if (s === 'previewing') { el.classList.add('editing'); el.textContent = '👁 Preview ready'; }
    else if (s === 'confirming') { el.classList.add('editing'); el.textContent = '🚀 Deploying…'; }
    else if (s === 'done')  { el.classList.add('done');  el.textContent = '✓ Live!'; }
    else if (s === 'error') { el.classList.add('error'); el.textContent = '✗ Error'; }
    else { el.textContent = 'Ready'; }
  }

  // ── Drag-to-resize ────────────────────────────────────────────────────────
  const divider = document.getElementById('divider');
  const leftPanel = document.getElementById('left-panel');
  const rightPanel = document.getElementById('right-panel');
  const panelsEl = document.getElementById('panels');
  let dragging = false;

  divider.addEventListener('mousedown', (e) => {
    dragging = true;
    divider.classList.add('dragging');
    document.body.style.cursor = 'col-resize';
    document.body.style.userSelect = 'none';
    e.preventDefault();
  });

  document.addEventListener('mousemove', (e) => {
    if (!dragging) return;
    const rect = panelsEl.getBoundingClientRect();
    const pct = ((e.clientX - rect.left) / rect.width) * 100;
    const clamped = Math.max(25, Math.min(75, pct));
    rightPanel.style.width = clamped + '%';
    leftPanel.style.flex = 'none';
    leftPanel.style.width = (100 - clamped - 0.3) + '%';
  });

  document.addEventListener('mouseup', () => {
    if (!dragging) return;
    dragging = false;
    divider.classList.remove('dragging');
    document.body.style.cursor = '';
    document.body.style.userSelect = '';
  });

  // ── Keyboard shortcut: Enter to send ─────────────────────────────────────
  document.getElementById('instruction').addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendEdit();
    }
  });

  // ── Boot ──────────────────────────────────────────────────────────────────
  init();
</script>
</body>
</html>
